aid: echostar
name: EchoStar
description: >-
  EchoStar Corporation (Nasdaq: SATS) is a global, fully integrated communications
  and content delivery leader and provider of technology, spectrum, and connectivity.
  Through its DISH, Boost Mobile, Hughes, and EchoStar Mobile brands, EchoStar
  delivers satellite communications, wireless services, and IoT connectivity to
  consumers, enterprises, governments, and aviation customers worldwide.
